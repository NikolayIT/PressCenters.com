name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore src/PressCenters.sln

    - name: Build
      run: dotnet build src/PressCenters.sln --configuration Release --no-restore

    - name: Test
      # PressCenters.Services.Sources.Tests are LIVE integration tests that fetch real sites, so they
      # fail (and flake) from CI runners' network/IP regardless of the code. Gate CI on the unit-test
      # projects only, so a red run means a real regression rather than the outside world. Run the
      # scraper suite locally/on demand:
      #   dotnet test src/Tests/PressCenters.Services.Sources.Tests
      # (add --filter "Category!=ExternallyBlocked" to skip the sources that are blocked even from a dev box).
      run: dotnet test src/PressCenters.sln --configuration Release --no-build --verbosity normal --filter "FullyQualifiedName!~PressCenters.Services.Sources.Tests"
