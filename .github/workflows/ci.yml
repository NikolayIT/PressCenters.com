name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore
      run: dotnet restore src/PressCenters.sln

    - name: Build
      run: dotnet build src/PressCenters.sln --configuration Release --no-restore

    - name: Test
      # Exclude sources that fail only from the outside world (anti-bot blocks, offline sites, or a
      # .NET TLS-fingerprint block no relay bypasses) so a red run means a real regression. These live
      # integration tests still run on demand: dotnet test --filter "Category=ExternallyBlocked".
      run: dotnet test src/PressCenters.sln --configuration Release --no-build --verbosity normal --filter "Category!=ExternallyBlocked"
